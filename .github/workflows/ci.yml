name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "paisaera-backend/**"
  pull_request:
    paths:
      - "paisaera-backend/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paisaera-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paisaera
          POSTGRES_PASSWORD: paisaera
          POSTGRES_DB: paisaera_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: paisaera-backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (basic syntax check)
        run: |
          python -m py_compile $(find app -name "*.py")

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://paisaera:paisaera@localhost:5432/paisaera_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-not-for-production
        run: pytest --tb=short

      - name: Verify app imports and OpenAPI schema generates
        env:
          DATABASE_URL: postgresql+psycopg2://paisaera:paisaera@localhost:5432/paisaera_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-not-for-production
        run: python scripts/generate_openapi.py
