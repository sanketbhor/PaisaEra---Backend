version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paisaera
      POSTGRES_PASSWORD: paisaera
      POSTGRES_DB: paisaera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paisaera"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/code

  # Uncomment once you're ready to run scheduled jobs (Daily Brief, Money Score recompute):
  #
  # celery_worker:
  #   build: .
  #   command: celery -A app.workers.celery_app worker --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #     - redis
  #
  # celery_beat:
  #   build: .
  #   command: celery -A app.workers.celery_app beat --loglevel=info
  #   env_file:
  #     - .env
  #   depends_on:
  #     - db
  #     - redis

volumes:
  pgdata:
